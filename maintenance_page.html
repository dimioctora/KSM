<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Maintenance | PT. Kawan Sejati Manunggal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #00f2fe;
            --secondary-color: #4facfe;
            --bg-color: #050b14;
            --surface-color: rgba(16, 26, 43, 0.6);
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            overflow-y: auto;
            position: relative;
            padding: 1.5rem;
        }

        /* Subtle animated background */
        .bg-animation {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #0d1e3a 0%, var(--bg-color) 100%);
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                radial-gradient(circle at 15% 50%, rgba(79, 172, 254, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(0, 242, 254, 0.08) 0%, transparent 50%);
            animation: pulse 8s ease-in-out infinite alternate;
        }

        @keyframes pulse {
            0% {
                opacity: 0.5;
            }

            100% {
                opacity: 1;
            }
        }

        .container {
            text-align: center;
            z-index: 10;
            padding: 3.5rem 3rem;
            background: var(--surface-color);
            border: 1px solid rgba(79, 172, 254, 0.2);
            border-radius: 24px;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5),
                inset 0 0 0 1px rgba(255, 255, 255, 0.05);
            max-width: 800px;
            width: 100%;
            margin: auto;
            transform: translateY(0);
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-10px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 1.5rem;
        }

        .logo-img {
            height: 50px;
            width: auto;
            filter: drop-shadow(0 0 10px rgba(0, 242, 254, 0.3));
        }

        .logo-text {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 600;
            margin-bottom: 1rem;
            line-height: 1.2;
        }

        p {
            font-size: 1.125rem;
            color: var(--text-secondary);
            margin-bottom: 2.5rem;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.6;
        }

        .countdown {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .time-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 1.5rem;
            width: 120px;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .time-box:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px -5px rgba(79, 172, 254, 0.3);
            border-color: rgba(79, 172, 254, 0.4);
        }

        .time-box::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.05), transparent);
            transform: skewX(-20deg);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% {
                left: -100%;
            }

            20% {
                left: 200%;
            }

            100% {
                left: 200%;
            }
        }

        .time-box span {
            display: block;
        }

        .time-box .number {
            font-size: 3rem;
            font-weight: 800;
            color: var(--primary-color);
            text-shadow: 0 0 20px rgba(0, 242, 254, 0.4);
        }

        .time-box .label {
            font-size: 0.875rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 0.5rem;
            font-weight: 600;
        }

        .progress-container {
            margin-top: 3rem;
            width: 100%;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            width: 82%;
            background: linear-gradient(90deg, var(--secondary-color), var(--primary-color));
            border-radius: 3px;
            position: relative;
            box-shadow: 0 0 10px var(--primary-color);
            animation: load 2s ease-out forwards;
        }

        @keyframes load {
            0% {
                width: 0;
            }

            100% {
                width: 82%;
            }
        }

        .status {
            margin-top: 1rem;
            font-size: 0.875rem;
            color: var(--primary-color);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: var(--primary-color);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--primary-color);
            animation: blink 1s infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 2.5rem 1.5rem;
                border-radius: 20px;
            }

            .logo-container {
                gap: 12px;
                margin-bottom: 1rem;
            }

            .logo-img {
                height: 40px;
            }

            .logo-text {
                font-size: 1.5rem;
            }

            h1 {
                font-size: 1.75rem;
                margin-bottom: 0.75rem;
            }

            p {
                font-size: 1rem;
                margin-bottom: 2rem;
                padding: 0 10px;
            }

            .countdown {
                gap: 1rem;
            }

            .time-box {
                width: calc(50% - 0.5rem);
                max-width: 110px;
                padding: 1.25rem 0.75rem;
                border-radius: 12px;
            }

            .time-box .number {
                font-size: 2.25rem;
            }

            .time-box .label {
                font-size: 0.75rem;
            }

            .progress-container {
                margin-top: 2.5rem;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 1rem;
            }

            .container {
                padding: 2rem 1.25rem;
            }

            .logo-container {
                flex-direction: column;
                gap: 10px;
            }

            .logo-text {
                font-size: 1.25rem;
                line-height: 1.2;
            }

            h1 {
                font-size: 1.5rem;
            }

            .countdown {
                gap: 0.75rem;
            }

            .time-box {
                width: calc(50% - 0.375rem);
                padding: 1rem 0.5rem;
            }

            .time-box .number {
                font-size: 1.75rem;
            }

            .status {
                font-size: 0.75rem;
                letter-spacing: 1px;
            }
        }
    </style>
</head>

<body>
    <div class="bg-animation"></div>

    <div class="container">
        <div class="logo-container">
            <img src="images/LOGO-KSM.png" alt="Logo KSM" class="logo-img">
            <div class="logo-text">KSM</div>
        </div>
        <h1>System on Development</h1>
        <p>We are preparing a new system infrastructure to provide a more professional, secure, and advanced experience.
            <br>Please check back later.
        </p>

        <div class="countdown" id="countdown">
            <div class="time-box">
                <span class="number" id="days">00</span>
                <span class="label">Hari</span>
            </div>
            <div class="time-box">
                <span class="number" id="hours">00</span>
                <span class="label">Jam</span>
            </div>
            <div class="time-box">
                <span class="number" id="minutes">00</span>
                <span class="label">Menit</span>
            </div>
            <div class="time-box">
                <span class="number" id="seconds">00</span>
                <span class="label">Detik</span>
            </div>
        </div>

        <div class="progress-container">
            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>
            <div class="status">
                <div class="status-dot"></div>
                System Integration Progress 82%
            </div>
        </div>
    </div>

    <script>
        // Target Date: May 4, 2026
        const countDownDate = new Date("May 4, 2026 00:00:00").getTime();

        const updateCountdown = () => {
            const now = new Date().getTime();
            const distance = countDownDate - now;

            if (distance < 0) {
                document.getElementById("days").innerText = "00";
                document.getElementById("hours").innerText = "00";
                document.getElementById("minutes").innerText = "00";
                document.getElementById("seconds").innerText = "00";
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = days.toString().padStart(2, '0');
            document.getElementById("hours").innerText = hours.toString().padStart(2, '0');
            document.getElementById("minutes").innerText = minutes.toString().padStart(2, '0');
            document.getElementById("seconds").innerText = seconds.toString().padStart(2, '0');
        };

        updateCountdown();
        setInterval(updateCountdown, 1000);
    </script>
</body>

</html>
